name: Validar V2.3.2

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validar sintaxe Python
        run: |
          python -m py_compile app/execution_preflight.py app/bootstrap_v232.py app/bootstrap_v23_entry.py tests/test_execution_preflight.py
      - name: Executar testes de preflight
        run: python -m unittest tests/test_execution_preflight.py
      - name: Validar versão V2.3.2 ou posterior
        run: python scripts/validate_version_floor.py --minimum 2.3.2
      - name: Validar marcadores de sessão
        run: |
          grep -q "LISTA EXPIRADA" app/bootstrap_v232.py
          grep -q 'close_current_session(self, "CANCELADO")' app/bootstrap_v232.py
          grep -q 'session\["status"\] = "EXPIRADA"' app/bootstrap_v232.py
          grep -q "bootstrap_v232.install_patch" app/bootstrap_v23_entry.py
