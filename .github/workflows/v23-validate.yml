name: Validar V2.3

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validar sintaxe Python
        run: |
          python -m py_compile app/main.py app/bootstrap_v22.py app/bootstrap_v22_entry.py app/bootstrap_v23.py app/bootstrap_v23_entry.py
      - name: Validar scripts shell
        run: bash -n run.sh install_desktop.sh
      - name: Validar versão
        run: test "$(tr -d '\n' < VERSION)" = "2.3.0"
      - name: Validar marcadores V2.3
        run: |
          grep -q "▲ PARA CIMA" app/bootstrap_v23.py
          grep -q "Histórico por sessão" app/bootstrap_v23.py
          grep -q "SELECIONADA" app/bootstrap_v23.py
